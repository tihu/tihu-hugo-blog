baseURL = "https://tihu.github.io/tihu-hugo-blog/"
languageCode = "zh-cn"
title = "醍醐堂記_TihuBlogs"
theme = "PaperMod"
hasCJKLanguage = true
enableRobotsTXT = true
paginate = 15

[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "分类"
    url = "/categories/"
    weight = 2
  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 3
  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 4

[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  description = "这里是阅读、志怪、科幻、奇幻与播客的个人笔记空间。"
  author = "Tihu"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
