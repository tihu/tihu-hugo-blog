{{ define "main" }}
<style>
.main { max-width: 1400px !important; width: 100% !important; margin: 0 auto !important; padding: 2rem 1rem !important; }
.nav { display: none !important; }
.home-layout { display: grid; grid-template-columns: 280px 1fr; gap: 4rem; width: 100%; }
.home-sidebar { position: sticky; top: 2rem; height: fit-content; display: flex; flex-direction: column; gap: 1.5rem; }
.site-header-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
.site-title { font-size: 1.5rem; font-weight: 700; line-height: 1.3; margin: 0; }
.site-title a { color: var(--primary); text-decoration: none; }
.custom-theme-toggle { background: none; border: none; color: var(--primary); cursor: pointer; padding: 0.5rem; border-radius: 4px; transition: all 0.2s ease; }
.custom-theme-toggle:hover { background: var(--tertiary); }
.sidebar-desc { color: var(--secondary); font-size: 1rem; line-height: 1.6; margin: 0; }
.sidebar-nav { display: flex; flex-direction: column; gap: 0.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }
.sidebar-nav a { padding: 0.5rem 0; font-size: 1.05rem; color: var(--primary); text-decoration: none; transition: all 0.2s ease; }
.sidebar-nav a:hover { padding-left: 0.5rem; }
.sidebar-tags { padding-top: 1rem; border-top: 1px solid var(--border); }
.sidebar-tags h4 { font-size: 1.1rem; font-weight: 600; margin: 0 0 1rem 0; }
.tag-item { display: inline-block; padding: 0.35rem 0.75rem; background: var(--tertiary); border-radius: 6px; font-size: 0.85rem; color: var(--primary); text-decoration: none; margin: 0 0.5rem 0.5rem 0; transition: all 0.2s ease; }
.tag-item:hover { opacity: 0.8; }
:root { --primary: #222; --secondary: #666; --tertiary: #f5f5f5; --border: #e5e5e5; }
[data-theme="dark"] { --primary: #ddd; --secondary: #aaa; --tertiary: #2d2d2d; --border: #444; }
@media (max-width: 900px) {
  .home-layout { grid-template-columns: 1fr; gap: 2rem; }
  .home-sidebar { position: static; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
  .sidebar-nav { flex-direction: row; flex-wrap: wrap; gap: 1.5rem; }
  .sidebar-nav a:hover { padding-left: 0; }
}

/* 归档专用样式 */
.archive-year { margin-bottom: 3rem; }
.archive-year h2 { font-size: 1.4rem; font-weight: 700; margin: 0 0 1.2rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); color: var(--primary); }
.archive-item { display: flex; gap: 1.5rem; align-items: baseline; padding: 0.4rem 0; }
.archive-date { color: var(--secondary); font-size: 0.9rem; min-width: 60px; flex-shrink: 0; }
.archive-item a { color: var(--primary); text-decoration: none; font-size: 1rem; line-height: 1.5; }
.archive-item a:hover { text-decoration: underline; }
</style>

<div class="home-layout">
  {{ partial "sidebar.html" . }}

  <main>
    <h1 style="font-size: 1.75rem; font-weight: 700; margin: 0 0 2.5rem;">{{ i18n "archive_title" }}</h1>
    {{ range .Site.RegularPages.GroupByDate "2006" }}
    <div class="archive-year">
      <h2>{{ .Key }}{{ i18n "archive_year_suffix" }}</h2>
      {{ range .Pages.ByDate.Reverse }}
      <div class="archive-item">
        <span class="archive-date">{{ .Date.Format "01-02" }}</span>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      </div>
      {{ end }}
    </div>
    {{ end }}
  </main>
</div>
{{ end }}
