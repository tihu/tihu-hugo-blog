{{ define "main" }}
<div style="max-width: 800px; margin: 0 auto; padding: 4rem 1rem;">
  <h1 style="font-size: 2rem; font-weight: 700; margin: 0 0 2rem; text-align: center; color: #fff;">文章归档</h1>
  
  <!-- 按年份分组循环所有文章 -->
  {{ range .Site.RegularPages.GroupByDate "2006" }}
  <div style="margin-bottom: 3rem;">
    <h2 style="font-size: 1.5rem; font-weight: 600; margin: 0 0 1.5rem; color: #fff; border-bottom: 1px solid #333; padding-bottom: 0.5rem;">
      {{ .Key }} 年
    </h2>
    <div style="display: flex; flex-direction: column; gap: 1rem;">
      {{ range .Pages.ByDate.Reverse }}
      <div style="display: flex; gap: 1.5rem; align-items: center;">
        <span style="color: #888; font-size: 0.95rem; min-width: 75px;">{{ .Date.Format "01-02" }}</span>
        <a href="{{ .RelPermalink }}" style="color: #fff; text-decoration: none; font-size: 1.1rem; line-height: 1.5;">
          {{ .Title }}
        </a>
      </div>
      {{ end }}
    </div>
  </div>
  {{ end }}
</div>
{{ end }}
